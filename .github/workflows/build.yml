name: Build

on:
  push:
    branches: [ "**" ]
    tags: [ "v*" ]
  pull_request:

permissions:
  contents: write # needed to create releases when a v* tag is pushed

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Build (compiles + runs tests)
        run: |
          chmod +x ./gradlew
          ./gradlew build --stacktrace

      # Every build: attach the jar to the workflow run so you can download it.
      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: fw-paint-jar
          path: build/libs/*.jar
          if-no-files-found: error

      # On a v* tag: the release body comes from docs/release-notes/<tag>.md when it exists
      # (write one per version), with a generic fallback so a missing file never blocks a release.
      - name: Prepare release notes
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          NOTES="docs/release-notes/${GITHUB_REF_NAME}.md"
          if [ -f "$NOTES" ]; then
            cp "$NOTES" RELEASE_BODY.md
          else
            echo "No $NOTES found — using the fallback body."
            cat > RELEASE_BODY.md <<'EOF'
          **FW Paint** — a client-side Fabric mod for painting blocks: solid extrude/fill, gradients, and noise.

          Targets: Minecraft **26.2** · Fabric Loader **0.19.3+** · Fabric API for 26.2 · Java **25**.

          Install: drop the `fw-paint-fabric` jar below into a 26.2 Fabric instance's `mods/` folder
          (alongside Fabric API for 26.2).
          EOF
          fi

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: FW Paint ${{ github.ref_name }} (Minecraft 26.2)
          files: build/libs/*.jar
          generate_release_notes: true
          body_path: RELEASE_BODY.md
